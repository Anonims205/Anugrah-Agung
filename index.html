<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAWL KINGS — 2D Fighter</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --p1: #00eaff;
    --p2: #ff3c6e;
    --gold: #ffd700;
    --bg: #0a0010;
    --arena: #1a0030;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
display: flex; flex-direction: column; align-items: center; justify-content: center;
min-height: 100vh;
font-family: ‘Rajdhani’, sans-serif;
overflow: hidden;
user-select: none;
}

/* Animated background */
body::before {
content: ‘’;
position: fixed; inset: 0;
background:
radial-gradient(ellipse at 20% 50%, rgba(0,234,255,0.08) 0%, transparent 60%),
radial-gradient(ellipse at 80% 50%, rgba(255,60,110,0.08) 0%, transparent 60%),
radial-gradient(ellipse at 50% 100%, rgba(120,0,255,0.15) 0%, transparent 50%);
pointer-events: none; z-index: 0;
}

.game-wrapper {
position: relative; z-index: 1;
display: flex; flex-direction: column; align-items: center;
gap: 10px; width: 100%; max-width: 900px; padding: 10px;
}

/* TITLE */
.game-title {
font-family: ‘Bangers’, cursive;
font-size: clamp(28px, 5vw, 48px);
letter-spacing: 6px;
background: linear-gradient(135deg, var(–p1), #a855f7, var(–p2));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
text-shadow: none;
filter: drop-shadow(0 0 20px rgba(168,85,247,0.6));
animation: titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse {
0%,100% { filter: drop-shadow(0 0 20px rgba(168,85,247,0.6)); }
50% { filter: drop-shadow(0 0 40px rgba(168,85,247,1)); }
}

/* HUD */
.hud {
width: 100%; display: flex; align-items: center; gap: 12px;
padding: 0 4px;
}

.player-hud {
flex: 1; display: flex; flex-direction: column; gap: 6px;
}

.player-hud.p2 { align-items: flex-end; }

.player-name {
font-family: ‘Bangers’, cursive;
font-size: clamp(14px, 2.5vw, 22px);
letter-spacing: 3px;
}

.p1 .player-name { color: var(–p1); text-shadow: 0 0 15px var(–p1); }
.p2 .player-name { color: var(–p2); text-shadow: 0 0 15px var(–p2); }

.health-bar-wrap {
width: 100%; height: 22px;
background: rgba(0,0,0,0.6);
border-radius: 4px;
border: 2px solid rgba(255,255,255,0.1);
overflow: hidden;
position: relative;
}

.p2 .health-bar-wrap { direction: rtl; }

.health-bar {
height: 100%; width: 100%;
border-radius: 2px;
transition: width 0.15s ease;
position: relative;
}

.p1 .health-bar {
background: linear-gradient(90deg, #00ff88, #00eaff);
box-shadow: 0 0 12px #00eaff;
}

.p2 .health-bar {
background: linear-gradient(90deg, #ff3c6e, #ff8c00);
box-shadow: 0 0 12px #ff3c6e;
direction: ltr;
}

.health-bar::after {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 60%);
}

.timer-box {
flex-shrink: 0;
width: clamp(60px, 8vw, 80px);
text-align: center;
}

.timer {
font-family: ‘Bangers’, cursive;
font-size: clamp(32px, 5vw, 52px);
color: var(–gold);
text-shadow: 0 0 20px var(–gold), 0 0 40px rgba(255,215,0,0.5);
line-height: 1;
}

.round-indicator {
font-size: 10px; color: rgba(255,255,255,0.4);
letter-spacing: 2px; text-transform: uppercase;
}

/* CANVAS */
.canvas-container {
position: relative; width: 100%;
border-radius: 12px; overflow: hidden;
border: 2px solid rgba(255,255,255,0.08);
box-shadow:
0 0 0 1px rgba(168,85,247,0.2),
0 20px 60px rgba(0,0,0,0.8),
inset 0 1px 0 rgba(255,255,255,0.05);
}

canvas {
display: block; width: 100%; height: auto;
image-rendering: pixelated;
}

/* CONTROLS */
.controls {
display: flex; gap: 20px; align-items: center;
flex-wrap: wrap; justify-content: center;
}

.control-group {
display: flex; flex-direction: column; align-items: center; gap: 8px;
}

.control-label {
font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.3);
text-transform: uppercase;
}

.keys {
display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center;
}

.key {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.15);
border-bottom: 3px solid rgba(255,255,255,0.1);
border-radius: 6px;
padding: 4px 8px;
font-size: 11px; font-weight: 700;
color: rgba(255,255,255,0.6);
min-width: 30px; text-align: center;
font-family: ‘Rajdhani’, sans-serif;
}

.key.attack { border-color: rgba(255,215,0,0.4); color: var(–gold); }
.key.special { border-color: rgba(168,85,247,0.4); color: #a855f7; }

.divider { width: 1px; height: 40px; background: rgba(255,255,255,0.08); }

/* OVERLAY SCREENS */
.overlay {
position: absolute; inset: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 20px;
background: rgba(0,0,10,0.85);
backdrop-filter: blur(4px);
z-index: 10;
transition: opacity 0.4s;
}

.overlay.hidden { display: none; }

.overlay-title {
font-family: ‘Bangers’, cursive;
font-size: clamp(36px, 7vw, 72px);
letter-spacing: 6px;
text-align: center;
line-height: 1;
}

.overlay-sub {
font-size: clamp(12px, 2vw, 16px);
letter-spacing: 3px;
color: rgba(255,255,255,0.4);
text-align: center;
}

.btn-start {
font-family: ‘Bangers’, cursive;
font-size: clamp(18px, 3vw, 26px);
letter-spacing: 4px;
padding: 14px 40px;
background: linear-gradient(135deg, #a855f7, #7c3aed);
color: white;
border: none; border-radius: 8px;
cursor: pointer;
box-shadow: 0 0 30px rgba(168,85,247,0.6), 0 8px 20px rgba(0,0,0,0.4);
transition: all 0.2s;
animation: btnPulse 2s ease-in-out infinite;
}

@keyframes btnPulse {
0%,100% { box-shadow: 0 0 30px rgba(168,85,247,0.6), 0 8px 20px rgba(0,0,0,0.4); }
50% { box-shadow: 0 0 60px rgba(168,85,247,1), 0 8px 20px rgba(0,0,0,0.4); }
}

.btn-start:hover { transform: translateY(-3px) scale(1.05); }
.btn-start:active { transform: scale(0.97); }

.win-text { text-align: center; }
.win-text .winner { font-size: clamp(14px, 2vw, 18px); color: rgba(255,255,255,0.5); letter-spacing: 4px; }
.win-text .win-name { font-family: ‘Bangers’, cursive; font-size: clamp(40px, 8vw, 80px); letter-spacing: 4px; }

/* COMBO TEXT overlay */
#combo-display {
position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
pointer-events: none; z-index: 20;
font-family: ‘Bangers’, cursive;
font-size: 48px; letter-spacing: 3px;
color: var(–gold);
text-shadow: 0 0 20px var(–gold), 2px 2px 0 rgba(0,0,0,0.8);
opacity: 0;
transition: opacity 0.1s;
}

/* Mobile touch controls */
.mobile-controls {
display: none;
width: 100%;
gap: 10px;
}

.mobile-row {
display: flex; justify-content: space-between; align-items: center;
width: 100%; gap: 10px;
}

.dpad {
display: grid; grid-template-areas: “. up .” “left . right” “. down .”;
grid-template-columns: repeat(3, 44px);
grid-template-rows: repeat(3, 44px);
gap: 4px;
}

.dpad-btn {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 18px; color: white;
cursor: pointer; transition: all 0.1s;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}

.dpad-btn:active, .dpad-btn.pressed {
background: rgba(255,255,255,0.2);
transform: scale(0.9);
}

.dpad-btn.up { grid-area: up; }
.dpad-btn.left { grid-area: left; }
.dpad-btn.right { grid-area: right; }
.dpad-btn.down { grid-area: down; }

.action-btns {
display: grid; grid-template-columns: repeat(2, 50px);
grid-template-rows: repeat(2, 50px);
gap: 8px;
}

.action-btn {
border-radius: 50%;
border: 2px solid rgba(255,255,255,0.2);
font-family: ‘Bangers’, cursive;
font-size: 13px; letter-spacing: 1px;
cursor: pointer; transition: all 0.1s;
display: flex; align-items: center; justify-content: center;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}

.action-btn:active, .action-btn.pressed {
transform: scale(0.88);
filter: brightness(1.4);
}

.btn-punch { background: rgba(255,100,50,0.3); color: #ff6432; border-color: #ff6432; }
.btn-kick  { background: rgba(0,234,255,0.2); color: var(–p1); border-color: var(–p1); }
.btn-special { background: rgba(168,85,247,0.3); color: #a855f7; border-color: #a855f7; }
.btn-block { background: rgba(255,215,0,0.2); color: var(–gold); border-color: var(–gold); }

@media (max-width: 600px) {
.mobile-controls { display: flex; flex-direction: column; }
.controls { display: none; }
}

/* Difficulty selector */
.difficulty-row {
display: flex; gap: 10px; align-items: center; justify-content: center;
}

.diff-btn {
font-family: ‘Bangers’, cursive;
font-size: 16px; letter-spacing: 2px;
padding: 8px 20px; border-radius: 6px;
border: 2px solid; cursor: pointer;
transition: all 0.2s;
background: transparent;
}

.diff-btn.easy { border-color: #00ff88; color: #00ff88; }
.diff-btn.medium { border-color: var(–gold); color: var(–gold); }
.diff-btn.hard { border-color: var(–p2); color: var(–p2); }
.diff-btn.selected { filter: brightness(1.5); transform: scale(1.05); }
.diff-btn:not(.selected) { opacity: 0.5; }

/* Floating particles */
.particles-canvas {
position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
}
</style>

<script>
// ========== PARTICLE BACKGROUND ==========
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}

function createParticle() {
  return {
    x: Math.random() * pCanvas.width,
    y: pCanvas.height + 10,
    vy: -(0.3 + Math.random() * 0.8),
    vx: (Math.random() - 0.5) * 0.5,
    size: 1 + Math.random() * 2,
    life: 1,
    decay: 0.003 + Math.random() * 0.005,
    color: Math.random() > 0.5 ? '#00eaff' : '#ff3c6e'
  };
}

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  if (Math.random() < 0.3) particles.push(createParticle());
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    pCtx.globalAlpha = p.life * 0.6;
    pCtx.fillStyle = p.color;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fill();
  });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}

resizeParticles();
animateParticles();
window.addEventListener('resize', resizeParticles);

// ========== GAME ENGINE ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 80;

let gameRunning = false;
let animFrame;
let gameTimer = 60;
let timerInterval;
let round = 1;
let scores = {p1: 0, p2: 0};
let difficulty = 'medium';
let p1ComboCount = 0, comboTimer = 0;

// AI difficulty config
const DIFF = {
  easy:   { reactionTime: 60, aggression: 0.3, blockChance: 0.2, jumpChance: 0.01 },
  medium: { reactionTime: 35, aggression: 0.55, blockChance: 0.4, jumpChance: 0.015 },
  hard:   { reactionTime: 15, aggression: 0.75, blockChance: 0.6, jumpChance: 0.025 }
};

// ========== FIGHTER CLASS ==========
class Fighter {
  constructor(x, color, facingRight, name) {
    this.x = x; this.y = GROUND;
    this.w = 60; this.h = 90;
    this.vx = 0; this.vy = 0;
    this.speed = 5;
    this.jumpForce = -18;
    this.gravity = 0.7;
    this.color = color;
    this.accentColor = color === '#00eaff' ? '#0066ff' : '#aa0033';
    this.facingRight = facingRight;
    this.name = name;
    this.hp = 100; this.maxHp = 100;
    this.isJumping = false;
    this.isBlocking = false;
    this.attackCooldown = 0;
    this.specialCooldown = 0;
    this.hitStun = 0;
    this.currentAnim = 'idle';
    this.animFrame = 0;
    this.animTimer = 0;
    this.effects = [];
    this.combo = 0;
    this.lastAttackTime = 0;
  }

  update() {
    // Gravity
    this.vy += this.gravity;
    this.y += this.vy;
    this.x += this.vx;

    if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; this.isJumping = false; }
    this.x = Math.max(30, Math.min(W - 30 - this.w, this.x));

    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.specialCooldown > 0) this.specialCooldown--;
    if (this.hitStun > 0) this.hitStun--;

    this.animTimer++;
    if (this.animTimer > 6) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

    this.effects = this.effects.filter(e => { e.life--; return e.life > 0; });
  }

  jump() {
    if (!this.isJumping && this.hitStun === 0) {
      this.vy = this.jumpForce; this.isJumping = true;
    }
  }

  attack(type, other) {
    if (this.attackCooldown > 0 || this.hitStun > 0) return false;
    let reach, dmg, cd, stunTime, color;

    if (type === 'punch') {
      reach = 90; dmg = 7; cd = 20; stunTime = 8; color = '#ff8844';
    } else if (type === 'kick') {
      reach = 110; dmg = 12; cd = 30; stunTime = 12; color = '#44aaff';
    } else { // special
      if (this.specialCooldown > 0) return false;
      reach = 130; dmg = 22; cd = 45; stunTime = 20; this.specialCooldown = 150;
      color = '#aa44ff';
      this.addEffect('special', color);
    }

    this.attackCooldown = cd;
    this.addEffect(type, color);

    // Check hit
    const myCenter = this.x + this.w / 2;
    const otherCenter = other.x + other.w / 2;
    const dist = Math.abs(myCenter - otherCenter);

    if (dist < reach) {
      if (other.isBlocking) {
        dmg = Math.floor(dmg * 0.15);
        other.addEffect('block', '#ffd700');
      }
      other.hp = Math.max(0, other.hp - dmg);
      other.hitStun = stunTime;
      other.addEffect('hit', '#ffffff');
      spawnHitParticles(other.x + other.w/2, other.y + other.h/2, color);
      flashScreen(color);
      return true;
    }
    return false;
  }

  addEffect(type, color) {
    this.effects.push({ type, color, life: 20, maxLife: 20 });
  }

  draw() {
    const cx = this.x + this.w / 2;
    const flip = this.facingRight ? 1 : -1;

    ctx.save();
    ctx.translate(cx, this.y);
    ctx.scale(flip, 1);

    const idle = Math.sin(this.animFrame * 0.8) * 2;
    const isHit = this.hitStun > 0;
    const isBlock = this.isBlocking;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 5, 30, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    const legOffset = this.isJumping ? 0 : Math.sin(this.animFrame * Math.PI * 0.5) * 5;
    // Left leg
    ctx.fillStyle = this.accentColor;
    ctx.beginPath();
    ctx.roundRect(-16, -30 + idle, 14, 35 + legOffset, 6);
    ctx.fill();
    // Right leg
    ctx.beginPath();
    ctx.roundRect(2, -30 + idle, 14, 35 - legOffset, 6);
    ctx.fill();

    // Boot highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(-16, -12 + idle, 14, 10, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(2, -12 + idle, 14, 10, 4);
    ctx.fill();

    // Body
    const bodyY = isBlock ? -68 + idle : -72 + idle;
    const grad = ctx.createLinearGradient(-22, bodyY, 22, bodyY + 50);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, this.accentColor);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-22, bodyY, 44, 50, 8);
    ctx.fill();

    // Belt
    ctx.fillStyle = this.accentColor;
    ctx.fillRect(-22, bodyY + 34, 44, 6);

    // Chest glow
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, bodyY + 14, 14, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // Arms
    const armAngle = isBlock ? -0.8 : (this.attackCooldown > 15 ? 0.5 : 0);
    // Back arm
    ctx.save();
    ctx.translate(-20, bodyY + 8);
    ctx.rotate(armAngle * -0.5);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.roundRect(-6, 0, 12, 28, 6);
    ctx.fill();
    ctx.restore();

    // Front arm (attack pose)
    ctx.save();
    ctx.translate(20, bodyY + 8);
    ctx.rotate(armAngle);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.roundRect(-6, 0, 12, 28 + (this.attackCooldown > 15 ? 15 : 0), 6);
    ctx.fill();
    // Fist
    ctx.fillStyle = '#f5c09a';
    ctx.beginPath();
    ctx.roundRect(-7, 24 + (this.attackCooldown > 15 ? 15 : 0), 14, 14, 5);
    ctx.fill();
    ctx.restore();

    // Head
    const headY = bodyY - 28;
    // Neck
    ctx.fillStyle = '#f5c09a';
    ctx.fillRect(-7, bodyY - 6, 14, 10);

    // Head shape
    ctx.fillStyle = '#f5c09a';
    ctx.beginPath();
    ctx.roundRect(-18, headY, 36, 32, [10, 10, 8, 8]);
    ctx.fill();

    // Hair
    ctx.fillStyle = this.accentColor;
    ctx.beginPath();
    ctx.roundRect(-18, headY, 36, 14, [10, 10, 0, 0]);
    ctx.fill();
    // Hair spikes
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(-12 + i * 8, headY + 2);
      ctx.lineTo(-8 + i * 8, headY - 10);
      ctx.lineTo(-4 + i * 8, headY + 2);
      ctx.fillStyle = this.accentColor;
      ctx.fill();
    }

    // Eyes
    ctx.fillStyle = isHit ? '#ff0000' : '#1a1a2e';
    ctx.beginPath(); ctx.ellipse(-7, headY + 18, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, headY + 18, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Eye glow
    ctx.fillStyle = this.color;
    ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.ellipse(-7, headY + 18, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, headY + 18, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // Mouth
    if (isHit) {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, headY + 25, 5, 0, Math.PI); ctx.stroke();
    }

    // Hit flash
    if (isHit && this.hitStun % 4 < 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.roundRect(-22, headY, 44, 80, 8); ctx.fill();
    }

    // Block shield
    if (isBlock) {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.roundRect(-28, headY - 5, 56, 80, 10);
      ctx.stroke();
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Effects
    this.effects.forEach(e => {
      const a = e.life / e.maxLife;
      const ex = this.facingRight ? this.x + this.w + 20 : this.x - 30;
      const ey = this.y - 50;

      if (e.type === 'punch' || e.type === 'kick' || e.type === 'hit' || e.type === 'block') {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        const size = (1 - a) * 40 + 10;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const r1 = size * 0.5, r2 = size;
          if (i % 2 === 0) { ctx.lineTo(ex + Math.cos(angle) * r1, ey + Math.sin(angle) * r1); }
          else { ctx.lineTo(ex + Math.cos(angle) * r2, ey + Math.sin(angle) * r2); }
        }
        ctx.closePath(); ctx.stroke();
        ctx.restore();
      }

      if (e.type === 'special') {
        ctx.save();
        ctx.globalAlpha = a * 0.8;
        const sg = ctx.createRadialGradient(cx, this.y - 45, 0, cx, this.y - 45, 60);
        sg.addColorStop(0, e.color);
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(cx, this.y - 45, 60, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    });
  }
}

// ========== HIT PARTICLES ==========
let hitParticles = [];

function spawnHitParticles(x, y, color) {
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    hitParticles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 25 + Math.random() * 20, maxLife: 45,
      size: 2 + Math.random() * 5, color,
      gravity: 0.3
    });
  }
}

function updateDrawParticles() {
  hitParticles = hitParticles.filter(p => p.life > 0);
  hitParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life--;
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ========== SCREEN FLASH ==========
function flashScreen(color) {
  const flash = document.getElementById('hitFlash');
  flash.style.background = color;
  flash.style.opacity = '0.25';
  setTimeout(() => flash.style.opacity = '0', 80);
}

// ========== BACKGROUND ==========
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#12003a');
  skyGrad.addColorStop(0.6, '#1a0035');
  skyGrad.addColorStop(1, '#2d0050');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  [[50,30],[120,60],[200,20],[300,45],[450,15],[600,50],[700,30],[800,25],[870,55]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  });

  // Neon buildings silhouette
  const buildings = [[20,180,70,200],[100,150,50,230],[160,120,80,260],[250,160,60,220],[320,100,90,280],[420,140,55,240],[485,130,45,250],[540,110,70,270],[620,155,50,225],[680,125,60,255],[750,145,55,235],[820,100,75,280]];
  buildings.forEach(([bx,by,bw,bh]) => {
    // Building body
    const bgrad = ctx.createLinearGradient(bx, by, bx+bw, by+bh);
    bgrad.addColorStop(0, '#1e0040');
    bgrad.addColorStop(1, '#150030');
    ctx.fillStyle = bgrad;
    ctx.fillRect(bx, by, bw, bh);

    // Neon outline glow
    ctx.strokeStyle = 'rgba(100,0,200,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Windows
    for (let wy = by+10; wy < by+bh-15; wy+=18) {
      for (let wx = bx+8; wx < bx+bw-8; wx+=14) {
        if (Math.random() > 0.3) {
          const wc = Math.random() > 0.6 ? '#00eaff' : '#ff3c6e';
          ctx.fillStyle = wc.replace(')', ',0.6)').replace('rgb', 'rgba');
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    }
  });

  // Ground
  const gGrad = ctx.createLinearGradient(0, GROUND, 0, H);
  gGrad.addColorStop(0, '#1a0040');
  gGrad.addColorStop(1, '#0a0020');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, GROUND + 5, W, H - GROUND);

  // Neon ground line
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 15; ctx.shadowColor = '#a855f7';
  ctx.beginPath(); ctx.moveTo(0, GROUND + 5); ctx.lineTo(W, GROUND + 5); ctx.stroke();
  ctx.shadowBlur = 0;

  // Ground reflection
  const refGrad = ctx.createLinearGradient(0, GROUND + 5, 0, GROUND + 40);
  refGrad.addColorStop(0, 'rgba(168,85,247,0.3)');
  refGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = refGrad;
  ctx.fillRect(0, GROUND + 5, W, 35);
}

// ========== GAME STATE ==========
let p1, p2;
let keys = {};
let aiThinkTimer = 0;
let aiDecision = { move: 0, action: null };

function createFighters() {
  p1 = new Fighter(150, '#00eaff', true, 'PLAYER');
  p2 = new Fighter(640, '#ff3c6e', false, 'AI KING');
}

// ========== INPUT ==========
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile buttons
function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const press = () => { keys[key] = true; btn.classList.add('pressed'); };
  const release = () => { keys[key] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', press, {passive: true});
  btn.addEventListener('touchend', release, {passive: true});
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
}

setupMobileBtn('mb-up', 'w');
setupMobileBtn('mb-left', 'a');
setupMobileBtn('mb-right', 'd');
setupMobileBtn('mb-down', 's');
setupMobileBtn('mb-punch', 'j');
setupMobileBtn('mb-kick', 'k');
setupMobileBtn('mb-special', 'l');
setupMobileBtn('mb-block', 'i');

// ========== AI LOGIC ==========
function updateAI() {
  const diff = DIFF[difficulty];
  aiThinkTimer++;

  if (aiThinkTimer < diff.reactionTime) return;
  aiThinkTimer = 0;

  const dist = Math.abs((p2.x + p2.w/2) - (p1.x + p1.w/2));
  const r = Math.random();

  // Decide movement
  if (dist > 180) {
    aiDecision.move = p2.x > p1.x ? -1 : 1;
  } else if (dist < 60) {
    aiDecision.move = p2.x > p1.x ? 1 : -1; // back off
  } else {
    aiDecision.move = r > 0.5 ? (p2.x > p1.x ? -1 : 1) : 0;
  }

  // Decide action
  aiDecision.action = null;
  if (dist < 130 && r < diff.aggression) {
    if (r < 0.08 && p2.specialCooldown === 0) aiDecision.action = 'special';
    else if (r < 0.25) aiDecision.action = 'kick';
    else aiDecision.action = 'punch';
  }

  // Block
  if (dist < 120 && r < diff.blockChance) aiDecision.action = 'block';

  // Jump
  if (r < diff.jumpChance) aiDecision.action = 'jump';
}

function applyAI() {
  if (!gameRunning || p2.hitStun > 0) return;

  // Face player
  p2.facingRight = p2.x + p2.w/2 < p1.x + p1.w/2;

  p2.vx = aiDecision.move * p2.speed;
  p2.isBlocking = aiDecision.action === 'block';

  if (aiDecision.action === 'punch') p2.attack('punch', p1);
  else if (aiDecision.action === 'kick') p2.attack('kick', p1);
  else if (aiDecision.action === 'special') p2.attack('special', p1);
  else if (aiDecision.action === 'jump') p2.jump();
}

// ========== PLAYER INPUT ==========
let prevPunch = false, prevKick = false, prevSpecial = false;

function handlePlayerInput() {
  if (!gameRunning || p1.hitStun > 0) return;

  const left = keys['a'] || keys['arrowleft'];
  const right = keys['d'] || keys['arrowright'];
  const up = keys['w'] || keys['arrowup'];

  p1.facingRight = p1.x + p1.w/2 < p2.x + p2.w/2;

  p1.vx = left ? -p1.speed : right ? p1.speed : 0;
  p1.isBlocking = !!(keys['i'] || keys['arrowdown']) && !p1.isJumping;

  if (up) p1.jump();

  const punch = !!keys['j'];
  const kick = !!keys['k'];
  const special = !!keys['l'];

  if (punch && !prevPunch) {
    const hit = p1.attack('punch', p2);
    if (hit) registerCombo();
  }
  if (kick && !prevKick) {
    const hit = p1.attack('kick', p2);
    if (hit) registerCombo();
  }
  if (special && !prevSpecial) {
    const hit = p1.attack('special', p2);
    if (hit) { registerCombo(); showComboText('SPECIAL!', '#a855f7'); }
  }

  prevPunch = punch; prevKick = kick; prevSpecial = special;
}

let comboTimerHandle = null;

function registerCombo() {
  p1ComboCount++;
  document.getElementById('p1Combo').textContent = p1ComboCount;
  if (p1ComboCount >= 3) showComboText(p1ComboCount + ' HIT COMBO!', p1ComboCount >= 6 ? '#a855f7' : '#ffd700');
  clearTimeout(comboTimerHandle);
  comboTimerHandle = setTimeout(() => { p1ComboCount = 0; document.getElementById('p1Combo').textContent = 0; }, 1200);
}

function showComboText(text, color) {
  const el = document.getElementById('comboDisplay');
  el.textContent = text; el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}, 2px 2px 0 rgba(0,0,0,0.8)`;
  el.style.opacity = '1';
  el.style.transform = 'translateX(-50%) scale(1.2)';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) scale(1)';
  }, 900);
}

// ========== HUD UPDATE ==========
function updateHUD() {
  document.getElementById('p1Health').style.width = p1.hp + '%';
  document.getElementById('p2Health').style.width = p2.hp + '%';
  if (p1.hp < 30) document.getElementById('p1Health').style.background = 'linear-gradient(90deg, #ff4444, #ff8800)';
  else document.getElementById('p1Health').style.background = '';
  if (p2.hp < 30) document.getElementById('p2Health').style.background = 'linear-gradient(90deg, #ff4444, #ff8800)';
}

// ========== TIMER ==========
function startTimer() {
  gameTimer = 60;
  document.getElementById('timerDisplay').textContent = gameTimer;
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    gameTimer--;
    document.getElementById('timerDisplay').textContent = Math.max(0, gameTimer);
    if (gameTimer <= 0) {
      clearInterval(timerInterval);
      endRound(p1.hp >= p2.hp ? 'p1' : 'p2');
    }
  }, 1000);
}

// ========== ROUND MANAGEMENT ==========
function showRoundStart() {
  const overlay = document.getElementById('roundOverlay');
  document.getElementById('roundNum').textContent = round;
  document.getElementById('roundText').textContent = 'ROUND ' + round;
  overlay.classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('fightText').style.display = 'block';
    setTimeout(() => {
      overlay.classList.add('hidden');
      gameRunning = true;
      startTimer();
    }, 800);
  }, 600);
}

function endRound(winner) {
  gameRunning = false;
  clearInterval(timerInterval);
  scores[winner]++;

  const koOverlay = document.getElementById('koOverlay');
  koOverlay.classList.remove('hidden');
  setTimeout(() => {
    koOverlay.classList.add('hidden');
    if (scores.p1 >= 2 || scores.p2 >= 2) {
      showWin(scores.p1 >= 2 ? 'p1' : 'p2');
    } else {
      round++;
      document.getElementById('roundNum').textContent = round;
      createFighters();
      hitParticles = [];
      showRoundStart();
    }
  }, 1800);
}

function showWin(winner) {
  const el = document.getElementById('winOverlay');
  document.getElementById('winnerName').textContent = winner === 'p1' ? 'PLAYER' : 'AI KING';
  document.getElementById('winnerName').style.color = winner === 'p1' ? 'var(--p1)' : 'var(--p2)';
  const perfect = (winner === 'p1' ? p2.hp : p1.hp) === 100;
  document.getElementById('winSlogan').textContent = perfect ? '⚡ PERFECT! ⚡' : winner === 'p1' ? '🏆 VICTORY!' : '💀 GAME OVER';
  el.classList.remove('hidden');
}

// ========== MAIN LOOP ==========
function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (p1 && p2) {
    handlePlayerInput();
    updateAI();
    applyAI();
    p1.update();
    p2.update();
    updateHUD();
    updateDrawParticles();
    p2.draw();
    p1.draw();

    // Check KO
    if (gameRunning) {
      if (p1.hp <= 0) { p1.hp = 0; endRound('p2'); }
      else if (p2.hp <= 0) { p2.hp = 0; endRound('p1'); }
    }
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ========== CONTROLS ==========
function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.diff-btn.' + d).classList.add('selected');
  document.getElementById('diffLabel').textContent = d.toUpperCase();
  const colors = { easy: '#00ff88', medium: '#ffd700', hard: '#ff3c6e' };
  document.getElementById('diffLabel').style.color = colors[d];
}

function startGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  round = 1; scores = {p1:0, p2:0};
  document.getElementById('roundNum').textContent = round;
  createFighters();
  hitParticles = [];
  showRoundStart();
}

function resetGame() {
  document.getElementById('winOverlay').classList.add('hidden');
  gameRunning = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  p1 = null; p2 = null;
  hitParticles = [];
  round = 1; scores = {p1:0, p2:0};
  p1ComboCount = 0;
  document.getElementById('p1Combo').textContent = 0;
  gameLoop();
  document.getElementById('startOverlay').classList.remove('hidden');
}

// Start render loop
gameLoop();
</script>
